codecov:
  require_ci_to_pass: true
  strict_yaml_branch: main

coverage:
  precision: 2
  round: down
  range: 0..100
  status:
    project:
      default:
        target: auto
        threshold: 0.5%
    patch:
      default:
        target: 85%
        threshold: 2%

ignore:
  - "test/**"
  - "coverage/**"
  - "docs/**"
  - "adapters/**"
  - "scripts/**"
  - ".github/**"
  - "*.config.js"
  - "*.config.mjs"

comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  behavior: default
  require_changes: false
  hide_project_coverage: false
